name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Gate — full check suite must pass before release
        run: bun run check
      - name: Cross-compile per-platform binaries
        run: bun scripts/build-release.ts
      - name: Checksums
        working-directory: dist/release
        run: for f in beagle-*; do sha256sum "$f" > "$f.sha256"; done
      # Signing (cosign/minisign) and GitHub Release upload steps go here;
      # per the supply-chain rule, npm publishing bundles these same binaries
      # per-platform and never fetches on post-install.
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
