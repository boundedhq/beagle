name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-auth-preflight:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Verify npm publishing credentials
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured for this repository." >&2
            exit 1
          fi
          npm whoami

  release:
    if: github.event_name == 'push'
    permissions:
      contents: write # create the GitHub release
      id-token: write # npm provenance (signed build attestation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Gate — release tag matches the binary/package version
        run: |
          version="$(bun -e 'import { BEAGLE_VERSION } from "./src/core/version"; process.stdout.write(BEAGLE_VERSION)')"
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "release tag $GITHUB_REF_NAME does not match source version v$version" >&2
            exit 1
          fi
      - name: Gate — npm publishing credentials work
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required because npm is Beagle's primary install channel." >&2
            exit 1
          fi
          npm whoami
      - run: bun install --frozen-lockfile
      - name: Gate — full check suite must pass before release
        run: bun run check
      - name: Cross-compile per-platform binaries
        run: bun scripts/build-release.ts
      - name: Package the installer
        run: cp packaging/install.sh dist/release/install.sh
      - name: Checksums
        working-directory: dist/release
        run: for f in beagle-* install.sh; do sha256sum "$f" > "$f.sha256"; done
      # Signing (cosign/minisign) is on the roadmap; the published sha256s are
      # the integrity check until then.
      # npm channel (primary): a launcher package + one binary package per
      # platform (os/cpu-guarded optionalDependencies) — the binary rides the
      # tarball, no post-install fetch.
      - name: Build npm packages
        run: bun scripts/build-npm.ts
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_if_missing() {
            dir="$1"
            name="$(node -e 'console.log(require("./" + process.argv[1] + "/package.json").name)' "$dir")"
            version="$(node -e 'console.log(require("./" + process.argv[1] + "/package.json").version)' "$dir")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version is already published — skipping"
              return
            fi
            npm publish "$dir" --access public --provenance
          }
          # Platform packages first so the launcher's optionalDependencies
          # resolve. --provenance signs each with a Sigstore attestation tying it
          # to this workflow + commit (needs id-token: write + repository.url).
          for d in dist/npm/beagle-*; do publish_if_missing "$d"; done
          publish_if_missing dist/npm/beagle
      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/release/*
          generate_release_notes: true
